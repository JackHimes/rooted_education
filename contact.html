	<body class="no-sidebar is-preload">
		<div id="page-wrapper">

			<section id="header">
					<h1><a href="index.html"><img src="images/everedlogo.jpeg" alt="Forever Educating" class="site-logo" /></a></h1>
					<nav id="nav">
						<ul>
							<li><a href="index.html">Home</a></li>
							<li><a href="about.html">About</a></li>
							<li>
								<a href="#">Services</a>
								<ul>
									<li><a href="#">Tutoring</a></li>
									<li><a href="#">Home-School Consulting</a></li>
									<li><a href="#">Writing Support</a></li>

							</li>
							<li class="current"><a href="contact.html">Contact</a></li>
						</ul>
					</nav>
			</section>

			<section id="main">
				<div class="container">
					<div class="row">
						<div class="col-12">
							<article class="box post contact-page">
								<header class="major">
									<h2>Contact</h2>
									<p>Send a message and we&rsquo;ll get back to you.</p>
								</header>
								<div class="row aln-middle">
									<div class="col-6 col-12-medium">
										<!--
											Formspree _next must be your live page URL (https://…), not a relative path.
											Replace YOURUSERNAME and YOUR-REPO-NAME with your GitHub username and repo (Pages URL).
											Example: https://emily.github.io/em-portfolio-website/thank-you.html
										-->
										<form class="contact-form" method="post" action="https://formspree.io/f/xeevjpny">
											<input type="hidden" name="_subject" value="Forever Educating — contact form" />
											<input type="hidden" name="_next" value="https://YOURUSERNAME.github.io/YOUR-REPO-NAME/thank-you.html" />
											<div class="field">
												<label for="contact-name">Name</label>
												<input type="text" id="contact-name" name="name" autocomplete="name" required />
											</div>
											<div class="field">
												<label for="contact-email">Email</label>
												<input type="email" id="contact-email" name="email" autocomplete="email" required />
											</div>
											<div class="field">
												<label for="contact-message">Message</label>
												<textarea id="contact-message" name="message" rows="5" required></textarea>
											</div>
											<ul class="actions">
												<li><button type="submit" class="button large">Submit</button></li>
											</ul>
										</form>
									</div>
									<div class="col-6 col-12-medium contact-gallery">
										<div class="row gtr-25">
											<div class="col-6 col-12-small contact-gallery-cell contact-gallery-cell--1">
												<img id="contact-gallery-photo-1" src="images/contact1.JPG" alt="" />
											</div>
											<div class="col-6 col-12-small contact-gallery-cell contact-gallery-cell--2">
												<img id="contact-gallery-photo-2" src="images/contact2.jpeg" alt="" />
											</div>
											<div class="col-6 col-12-small contact-gallery-cell contact-gallery-cell--3">
												<img id="contact-gallery-photo-3" src="images/contact3.jpeg" alt="" />
											</div>
											<div class="col-6 col-12-small contact-gallery-cell contact-gallery-cell--4">
												<img id="contact-gallery-photo-4" src="images/contact4.JPG" alt="" />
											</div>
										</div>
									</div>
								</div>
							</article>
						</div>
					</div>
				</div>
			</section>

						</div>
					</div>
